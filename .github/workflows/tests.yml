name: UI Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      has_report: ${{ steps.allure.outputs.has_report }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt --upgrade-strategy only-if-needed

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run tests (headless)
        env:
          HEADLESS: "true"
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          INVESTIGATIONS_URL: ${{ secrets.INVESTIGATIONS_URL }}
          USER1_LOGIN: ${{ secrets.USER1_LOGIN }}
          USER1_PASSWORD: ${{ secrets.USER1_PASSWORD }}
          USER2_LOGIN: ${{ secrets.USER2_LOGIN }}
          USER2_PASSWORD: ${{ secrets.USER2_PASSWORD }}
        run: pytest tests/ -v --tb=short --deselect tests/test_dashboard.py::test_video_popup_elements

      - name: Set up Java (for Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.30.0
          curl -fsSL "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" -o /tmp/allure.tgz
          tar -xzf /tmp/allure.tgz -C /tmp
          echo "/tmp/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Generate Allure report
        id: allure
        if: always()
        run: |
          echo "has_report=false" >> "$GITHUB_OUTPUT"
          if [[ -d allure-results ]] && [[ -n "$(ls -A allure-results 2>/dev/null)" ]]; then
            allure generate allure-results -o allure-report --clean
            touch allure-report/.nojekyll
            echo "has_report=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Allure report to GitHub Pages
        if: >
          always() &&
          steps.allure.outputs.has_report == 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Upload pytest cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            .pytest_cache/
            *.log
          if-no-files-found: ignore
          retention-days: 7

  deploy-allure:
    needs: test
    if: >
      always() &&
      needs.test.outputs.has_report == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Allure to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
